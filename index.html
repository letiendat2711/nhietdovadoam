<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Dashboard - Nhiệt độ & Độ ẩm</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <div class="header-title">
                <h1><i class="fa-solid fa-server"></i> Smart Environment Monitor</h1>
                <p>Theo dõi thời gian thực dữ liệu phòng लैब</p>
            </div>
            <div class="connection-status">
                <span id="mqtt-status" class="status-indicator"></span>
                <span id="mqtt-status-text">Đang kết nối...</span>
            </div>
        </header>

        <main>
            <div class="cards-grid">
                <!-- Temperature Card -->
                <div class="data-card temp-card">
                    <div class="card-icon">
                        <i class="fa-solid fa-temperature-half"></i>
                    </div>
                    <div class="card-content">
                        <h3>Nhiệt độ</h3>
                        <div class="value-container">
                            <span id="temp-value">--</span>
                            <span class="unit">°C</span>
                        </div>
                        <div class="card-meta">
                            <span class="old-value" title="Giá trị cũ">Cũ: <span id="temp-old">--</span> °C</span>
                            <span class="time" title="Lần cập nhật cuối"><i class="fa-regular fa-clock"></i> <span id="temp-time">--:--:--</span></span>
                        </div>
                    </div>
                </div>

                <!-- Humidity Card -->
                <div class="data-card hum-card">
                    <div class="card-icon">
                        <i class="fa-solid fa-droplet"></i>
                    </div>
                    <div class="card-content">
                        <h3>Độ ẩm</h3>
                        <div class="value-container">
                            <span id="hum-value">--</span>
                            <span class="unit">%</span>
                        </div>
                        <div class="card-meta">
                            <span class="old-value" title="Giá trị cũ">Cũ: <span id="hum-old">--</span> %</span>
                            <span class="time" title="Lần cập nhật cuối"><i class="fa-regular fa-clock"></i> <span id="hum-time">--:--:--</span></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="list-container">
                <h2><i class="fa-solid fa-list-ul"></i> Nhật ký Dữ liệu</h2>
                <div class="table-responsive">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>Thời gian</th>
                                <th>Nhiệt độ (°C)</th>
                                <th>Độ ẩm (%)</th>
                                <th>Trạng thái</th>
                            </tr>
                        </thead>
                        <tbody id="history-tbody">
                            <tr>
                                <td colspan="4" style="text-align: center;">Đang tải dữ liệu...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
